<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prompt Optimizer — Claude Code</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --surface-2: #1e1e1e;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --text-muted: #666;
      --text-dim: #3a3a3a;
      --strong: #22c55e;
      --strong-bg: #052e16;
      --needs-work: #f59e0b;
      --needs-work-bg: #1c1400;
      --critical: #ef4444;
      --critical-bg: #2d0707;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --mono: 'JetBrains Mono', 'Fira Code', monospace;
      --sans: 'Inter', system-ui, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    /* Header */
    .header { margin-bottom: 36px; }
    .header h1 {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: #fff;
    }
    .header p {
      color: var(--text-muted);
      margin-top: 4px;
      font-size: 13px;
    }

    /* Settings */
    .settings { margin-bottom: 24px; }
    .settings-toggle {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 12px;
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--sans);
    }
    .settings-toggle:hover { color: var(--text); }
    .settings-panel {
      margin-top: 12px;
      padding: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: none;
    }
    .settings-panel.open { display: block; }
    .settings-panel label {
      display: block;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .settings-panel input {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 12px;
      outline: none;
      transition: border-color 0.15s;
    }
    .settings-panel input:focus { border-color: var(--accent); }
    .settings-hint {
      margin-top: 8px;
      font-size: 11px;
      color: var(--text-muted);
    }

    /* Input section */
    .input-section { margin-bottom: 28px; }
    .input-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.7;
      resize: vertical;
      min-height: 160px;
      outline: none;
      transition: border-color 0.15s;
    }
    textarea:focus { border-color: #3a3a3a; }
    textarea::placeholder { color: #2e2e2e; }

    .input-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 10px;
    }
    .char-count {
      font-size: 12px;
      color: var(--text-muted);
      font-family: var(--mono);
    }

    button.analyze {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: var(--sans);
      transition: background 0.15s;
      letter-spacing: -0.1px;
    }
    button.analyze:hover { background: var(--accent-hover); }
    button.analyze:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Loading */
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
      font-size: 13px;
    }
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Error */
    .error-box {
      background: var(--critical-bg);
      border: 1px solid #5a1010;
      border-radius: 8px;
      padding: 14px 16px;
      color: #fca5a5;
      font-size: 13px;
      margin-bottom: 24px;
    }

    /* Iteration bar */
    .iteration-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .iteration-badge {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 12px;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .score-pills { display: flex; gap: 6px; }
    .score-pill {
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
    }
    .score-pill.strong { background: var(--strong-bg); color: var(--strong); }
    .score-pill.needs-work { background: var(--needs-work-bg); color: var(--needs-work); }
    .score-pill.critical { background: var(--critical-bg); color: var(--critical); }

    /* Dimensions */
    .dimensions-grid {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 32px;
    }
    .dimension-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      display: grid;
      grid-template-columns: 160px 1fr;
      gap: 16px;
      align-items: start;
    }
    .dimension-left {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    .dimension-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
    }
    .rating-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
      width: fit-content;
    }
    .rating-badge.strong { background: var(--strong-bg); color: var(--strong); }
    .rating-badge.needs-work { background: var(--needs-work-bg); color: var(--needs-work); }
    .rating-badge.critical { background: var(--critical-bg); color: var(--critical); }
    .rating-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }
    .dimension-right { display: flex; flex-direction: column; gap: 5px; }
    .diagnosis { font-size: 13px; color: var(--text); line-height: 1.5; }
    .fix {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.5;
    }
    .fix-label {
      color: var(--accent);
      font-weight: 500;
    }

    /* Divider */
    .divider { height: 1px; background: var(--border); margin: 28px 0; }

    /* Sections */
    .section { margin-bottom: 28px; }
    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }

    /* Revised prompt */
    .revised-prompt-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      padding-top: 40px;
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.7;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
      position: relative;
    }
    .prompt-actions {
      position: absolute;
      top: 10px;
      right: 10px;
      display: flex;
      gap: 6px;
    }
    .action-btn {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 4px 10px;
      font-size: 11px;
      color: var(--text-muted);
      cursor: pointer;
      font-family: var(--sans);
      transition: all 0.15s;
    }
    .action-btn:hover { color: var(--text); border-color: #3a3a3a; }
    .action-btn.primary {
      color: var(--accent);
      border-color: var(--accent);
    }
    .action-btn.primary:hover { background: var(--accent); color: #fff; }

    /* What changed */
    .what-changed-list { display: flex; flex-direction: column; gap: 10px; }
    .change-item {
      display: flex;
      gap: 10px;
      font-size: 13px;
      color: var(--text);
      line-height: 1.5;
    }
    .change-num {
      color: var(--accent);
      font-weight: 600;
      font-size: 12px;
      min-width: 18px;
      padding-top: 1px;
      flex-shrink: 0;
    }

    /* Gaps */
    .gaps-list { display: flex; flex-direction: column; gap: 8px; }
    .gap-item {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.5;
      padding: 10px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 2px solid var(--needs-work);
      border-radius: 6px;
    }

    /* History */
    .history-section {
      margin-top: 48px;
      padding-top: 32px;
      border-top: 1px solid var(--border);
    }
    .history-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 16px;
    }
    .history-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .history-round {
      font-size: 11px;
      color: var(--text-muted);
      min-width: 52px;
      font-family: var(--mono);
    }
    .history-bar {
      flex: 1;
      height: 4px;
      background: var(--surface-2);
      border-radius: 2px;
      overflow: hidden;
      display: flex;
    }
    .bar-strong { background: var(--strong); }
    .bar-needs-work { background: var(--needs-work); }
    .bar-critical { background: var(--critical); }
    .history-pills {
      display: flex;
      gap: 4px;
      min-width: 120px;
      justify-content: flex-end;
    }

    @media (max-width: 600px) {
      .dimension-card { grid-template-columns: 1fr; gap: 8px; }
      .history-pills { display: none; }
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="header">
      <h1>Prompt Optimizer</h1>
      <p>Evaluate and refine prompts before sending them to Claude Code</p>
    </div>

    <div class="settings">
      <button class="settings-toggle" onclick="toggleSettings()">
        <span id="settings-arrow">▸</span> API Settings
      </button>
      <div class="settings-panel" id="settings-panel">
        <label>Anthropic API Key</label>
        <input type="password" id="api-key" placeholder="sk-ant-..." oninput="saveApiKey()" />
        <div class="settings-hint">Saved locally in your browser. Never sent anywhere except the Anthropic API.</div>
      </div>
    </div>

    <div class="input-section">
      <div class="input-label">Prompt to Analyze</div>
      <textarea id="prompt-input" placeholder="Paste the prompt you plan to send to Claude Code..." oninput="updateCharCount()"></textarea>
      <div class="input-footer">
        <span class="char-count" id="char-count">0 characters</span>
        <button class="analyze" id="analyze-btn" onclick="analyze()">Analyze →</button>
      </div>
    </div>

    <div id="loading" style="display:none" class="loading">
      <span class="spinner"></span>Analyzing your prompt…
    </div>

    <div id="error-box" class="error-box" style="display:none"></div>

    <div id="results" style="display:none">
      <div class="iteration-bar">
        <span class="iteration-badge" id="iteration-label">Round 1</span>
        <div class="score-pills" id="score-pills"></div>
      </div>

      <div class="dimensions-grid" id="dimensions-grid"></div>

      <div class="divider"></div>

      <div class="section">
        <div class="section-title">Revised Prompt</div>
        <div class="revised-prompt-box" id="revised-prompt-box">
          <div class="prompt-actions">
            <button class="action-btn" onclick="copyRevised()">Copy</button>
            <button class="action-btn primary" onclick="useRevised()">Use as next input →</button>
          </div>
          <span id="revised-text"></span>
        </div>
      </div>

      <div class="section" id="what-changed-section">
        <div class="section-title">What Changed</div>
        <div class="what-changed-list" id="what-changed-list"></div>
      </div>

      <div class="section" id="gaps-section" style="display:none">
        <div class="section-title">Gaps</div>
        <div class="gaps-list" id="gaps-list"></div>
      </div>
    </div>

    <div class="history-section" id="history-section" style="display:none">
      <div class="history-title">Iteration History</div>
      <div id="history-rows"></div>
    </div>

  </div>

  <script>
    let iterations = [];
    let currentRevised = '';

    window.onload = () => {
      const saved = localStorage.getItem('anthropic-api-key');
      if (saved) document.getElementById('api-key').value = saved;
    };

    function saveApiKey() {
      const key = document.getElementById('api-key').value.trim();
      if (key) localStorage.setItem('anthropic-api-key', key);
    }

    function toggleSettings() {
      const panel = document.getElementById('settings-panel');
      const arrow = document.getElementById('settings-arrow');
      panel.classList.toggle('open');
      arrow.textContent = panel.classList.contains('open') ? '▾' : '▸';
    }

    function updateCharCount() {
      const len = document.getElementById('prompt-input').value.length;
      document.getElementById('char-count').textContent =
        `${len.toLocaleString()} character${len !== 1 ? 's' : ''}`;
    }

    function useRevised() {
      document.getElementById('prompt-input').value = currentRevised;
      updateCharCount();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function copyRevised() {
      navigator.clipboard.writeText(currentRevised).then(() => {
        const btn = document.querySelectorAll('.action-btn')[0];
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = 'Copy', 1500);
      });
    }

    async function analyze() {
      const prompt = document.getElementById('prompt-input').value.trim();
      const apiKey = document.getElementById('api-key').value.trim();

      if (!prompt) return;

      if (!apiKey) {
        showError('Enter your Anthropic API key in API Settings above.');
        return;
      }

      setLoading(true);
      hideError();

      const systemPrompt = `You are a prompt quality evaluator for Claude Code. Analyze the user's prompt across exactly seven dimensions and respond ONLY with valid JSON — no markdown, no explanation, no code fences.

Dimensions to evaluate:
1. Clarity — is the instruction unambiguous? Could it be interpreted more than one way?
2. Context — does Claude Code have what it needs to execute? Are the right files referenced, conventions stated, and scope established?
3. Scope — is the task bounded? Does it contain open-ended language that could cause drift?
4. Role and Persona — has the instruction established who Claude is in this session?
5. Instruction Sequencing — are constraints stated before tasks? Does it state what NOT to do after stating what to do?
6. Unresolved References — does the prompt contain pronouns or references (it, this, that, the component) without a clear antecedent?
7. Token Efficiency — is the prompt longer than it needs to be?

For each dimension provide:
- rating: exactly one of "Strong", "Needs Work", or "Critical"
- diagnosis: one sentence — what is specifically wrong, or "No issues found" if Strong
- fix: a specific, actionable instruction to fix it — omit this field entirely if rating is Strong

Also provide:
- revised_prompt: an improved version of the prompt with all identified issues addressed. Do not add information not present in the original. Do not invent file names, variable names, or constraints. If critical context is missing, flag it in gaps instead.
- what_changed: an array of strings. Each entry MUST: (a) name the specific dimension by number and name, (b) quote the exact original text that was changed, and (c) explain what was fixed and why. Generic explanations like "improved clarity" are not acceptable.
- gaps: an array of strings, each describing missing context that prevents full optimization. Empty array if none.

Respond with this exact JSON structure and nothing else:
{
  "dimensions": [
    {"name": "Clarity", "rating": "Strong|Needs Work|Critical", "diagnosis": "...", "fix": "..."},
    {"name": "Context", "rating": "...", "diagnosis": "...", "fix": "..."},
    {"name": "Scope", "rating": "...", "diagnosis": "...", "fix": "..."},
    {"name": "Role and Persona", "rating": "...", "diagnosis": "...", "fix": "..."},
    {"name": "Instruction Sequencing", "rating": "...", "diagnosis": "...", "fix": "..."},
    {"name": "Unresolved References", "rating": "...", "diagnosis": "...", "fix": "..."},
    {"name": "Token Efficiency", "rating": "...", "diagnosis": "...", "fix": "..."}
  ],
  "revised_prompt": "...",
  "what_changed": ["..."],
  "gaps": ["..."]
}`;

      try {
        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': apiKey,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true'
          },
          body: JSON.stringify({
            model: 'claude-sonnet-4-6',
            max_tokens: 2048,
            system: systemPrompt,
            messages: [{ role: 'user', content: prompt }]
          })
        });

        if (!response.ok) {
          const err = await response.json().catch(() => ({}));
          throw new Error(err.error?.message || `API error ${response.status}`);
        }

        const data = await response.json();
        const text = data.content[0].text.trim();

        let result;
        try {
          result = JSON.parse(text);
        } catch {
          const match = text.match(/\{[\s\S]*\}/);
          if (match) result = JSON.parse(match[0]);
          else throw new Error('Response was not valid JSON. Try again.');
        }

        renderResults(result);

      } catch (err) {
        showError(err.message);
      } finally {
        setLoading(false);
      }
    }

    function renderResults(result) {
      const round = iterations.length + 1;

      const counts = { Strong: 0, 'Needs Work': 0, Critical: 0 };
      result.dimensions.forEach(d => {
        if (counts[d.rating] !== undefined) counts[d.rating]++;
      });
      iterations.push({ round, counts });

      // Iteration label + pills
      document.getElementById('iteration-label').textContent = `Round ${round}`;
      const pillsEl = document.getElementById('score-pills');
      pillsEl.innerHTML = '';
      if (counts.Strong) pillsEl.innerHTML += `<span class="score-pill strong">${counts.Strong} Strong</span>`;
      if (counts['Needs Work']) pillsEl.innerHTML += `<span class="score-pill needs-work">${counts['Needs Work']} Needs Work</span>`;
      if (counts.Critical) pillsEl.innerHTML += `<span class="score-pill critical">${counts.Critical} Critical</span>`;

      // Dimensions
      const grid = document.getElementById('dimensions-grid');
      grid.innerHTML = '';
      result.dimensions.forEach((dim, i) => {
        const cls = dim.rating === 'Strong' ? 'strong'
                  : dim.rating === 'Needs Work' ? 'needs-work'
                  : 'critical';
        const fixHtml = dim.fix
          ? `<div class="fix"><span class="fix-label">Fix: </span>${esc(dim.fix)}</div>`
          : '';
        grid.innerHTML += `
          <div class="dimension-card">
            <div class="dimension-left">
              <div class="dimension-name">${i + 1}. ${esc(dim.name)}</div>
              <span class="rating-badge ${cls}">
                <span class="rating-dot"></span>${esc(dim.rating)}
              </span>
            </div>
            <div class="dimension-right">
              <div class="diagnosis">${esc(dim.diagnosis)}</div>
              ${fixHtml}
            </div>
          </div>`;
      });

      // Revised prompt
      currentRevised = result.revised_prompt || '';
      document.getElementById('revised-text').textContent = currentRevised;

      // What changed
      const wcSection = document.getElementById('what-changed-section');
      const wcList = document.getElementById('what-changed-list');
      wcList.innerHTML = '';
      const changes = result.what_changed || [];
      if (changes.length) {
        changes.forEach((c, i) => {
          wcList.innerHTML += `
            <div class="change-item">
              <span class="change-num">${i + 1}.</span>
              <span>${esc(c)}</span>
            </div>`;
        });
        wcSection.style.display = 'block';
      } else {
        wcSection.style.display = 'none';
      }

      // Gaps
      const gapsSection = document.getElementById('gaps-section');
      const gapsList = document.getElementById('gaps-list');
      const gaps = result.gaps || [];
      if (gaps.length) {
        gapsList.innerHTML = '';
        gaps.forEach((g, i) => {
          gapsList.innerHTML += `<div class="gap-item">${i + 1}. ${esc(g)}</div>`;
        });
        gapsSection.style.display = 'block';
      } else {
        gapsSection.style.display = 'none';
      }

      document.getElementById('results').style.display = 'block';
      renderHistory();
      document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function renderHistory() {
      const section = document.getElementById('history-section');
      if (iterations.length < 2) { section.style.display = 'none'; return; }
      section.style.display = 'block';

      const container = document.getElementById('history-rows');
      container.innerHTML = '';
      iterations.forEach(h => {
        const total = 7;
        const sp = ((h.counts.Strong / total) * 100).toFixed(1);
        const np = ((h.counts['Needs Work'] / total) * 100).toFixed(1);
        const cp = ((h.counts.Critical / total) * 100).toFixed(1);
        container.innerHTML += `
          <div class="history-row">
            <span class="history-round">Round ${h.round}</span>
            <div class="history-bar">
              <div class="bar-strong" style="width:${sp}%"></div>
              <div class="bar-needs-work" style="width:${np}%"></div>
              <div class="bar-critical" style="width:${cp}%"></div>
            </div>
            <div class="history-pills">
              ${h.counts.Strong ? `<span class="score-pill strong">${h.counts.Strong}S</span>` : ''}
              ${h.counts['Needs Work'] ? `<span class="score-pill needs-work">${h.counts['Needs Work']}NW</span>` : ''}
              ${h.counts.Critical ? `<span class="score-pill critical">${h.counts.Critical}C</span>` : ''}
            </div>
          </div>`;
      });
    }

    function setLoading(on) {
      document.getElementById('loading').style.display = on ? 'block' : 'none';
      document.getElementById('analyze-btn').disabled = on;
    }

    function showError(msg) {
      const el = document.getElementById('error-box');
      el.textContent = `Error: ${msg}`;
      el.style.display = 'block';
    }

    function hideError() {
      document.getElementById('error-box').style.display = 'none';
    }

    function esc(str) {
      return String(str || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
